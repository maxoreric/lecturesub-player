<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 LectureSub Player</title>
    <!-- We will let Tailwind or custom CSS handle styling, keeping the original styles for now -->
    <link rel="stylesheet" href="./src/style.css">
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="logo">
                    <img src="/assets/logo.png" alt="LectureSub Logo" style="height:32px; width:auto;">
                    <span>LectureSub</span>
                </div>
                <span class="course-tag" id="courseTag">COMP2041/9044 — Week 1</span>
                <button id="playlistBtn" class="header-btn" title="Open Playlist">📚 Lectures</button>
                <button id="showUploadBtn" class="header-btn"
                    style="background:var(--accent); border-color:var(--accent); color:white;">Upload 🔼</button>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="offset-control" title="Subtitle Offset (seconds)">
                    <span style="font-size:12px; color:var(--text-dim);">Offset:</span>
                    <input type="number" id="subOffset" value="0" step="0.5"
                        style="width:50px; background:var(--bg-light); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:2px 4px; font-size:12px;">
                </div>
                <input type="color" id="colorPicker" value="#ffeb3b" title="字幕高亮颜色"
                    style="width:24px; height:24px; padding:0; border:none; border-radius:4px; cursor:pointer; background:none;">
                <input type="text" id="searchBox" placeholder="搜索字幕 (F)...">
            </div>
        </div>

        <div class="main">
            <!-- Video Panel -->
            <div class="video-panel">
                <div class="video-container" id="videoContainer">
                    <video id="vPPT" preload="metadata">
                        <source src="/COMP2041_COMP9044 Le-s1-full.mp4" type="video/mp4">
                    </video>
                    <div class="pip-container" id="pip">
                        <div class="pip-header"><span style="font-size:9px; color:#aaa; font-weight:600;">🎥
                                TEACHER</span></div>
                        <video id="vTeacher" muted preload="metadata">
                            <source src="/COMP2041_COMP9044 Le-s2-full.mp4" type="video/mp4">
                        </video>
                    </div>
                    <button class="swap-btn" id="swapBtn" title="Swap Screens">⇄</button>
                    <div class="subtitle-overlay">
                        <div class="overlay-en" id="oEn"></div>
                        <div class="overlay-zh" id="oZh"></div>
                    </div>
                </div>
                <div class="controls">
                    <button class="play-btn" id="playBtn" title="Play/Pause (Space)">▶</button>
                    <input type="range" class="progress-bar" id="prog" value="0" step="0.1">
                    <span class="time-display" id="timeDisp">0:00 / 0:00</span>
                    <div style="display:flex; gap:6px; margin-left:10px;">
                        <button class="speed-btn active" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="1.25">1.25</button>
                        <button class="speed-btn" data-speed="1.5">1.5</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                    </div>
                </div>
            </div>

            <!-- Resizer -->
            <div class="resizer" id="resizer" title="Drag to resize"></div>

            <!-- Right Panel (Subtitles & Notes) -->
            <div class="subtitle-panel" id="subtitlePanel" style="flex:1;">
                <div class="panel-header">
                    <div class="panel-tabs">
                        <button class="tab-btn active" id="tabSubs">Subtitles 字幕</button>
                        <button class="tab-btn" id="tabNotes">Notes 笔记</button>
                    </div>
                </div>

                <!-- Subtitles View -->
                <div id="subsView" class="view-panel active" style="display:flex; flex-direction:column; height:100%;">
                    <div
                        style="padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text-dim);">
                        Total: <span id="subCount">0</span>
                    </div>
                    <div class="subtitle-list" id="subList">
                        <div style="padding:20px; text-align:center; color:#555;">Loading cues...</div>
                    </div>
                </div>

                <!-- Notes View -->
                <div id="notesView" class="notes-panel">
                    <div class="notes-controls">
                        <button class="header-btn" id="addNoteBtn"
                            style="margin-left:0; background:var(--accent); color:white; border:none;">+ Add Note
                            打点</button>
                        <button class="header-btn" id="downloadNotesBtn">Download MD 下载</button>
                    </div>
                    <div class="notes-list" id="notesList">
                        <!-- Notes will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Playlist Drawer -->
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="playlist-drawer" id="playlistDrawer">
            <div class="drawer-header">
                <h3>📚 All Lectures</h3>
                <button id="closeDrawer" class="close-btn">&times;</button>
            </div>
            <div class="lecture-list" id="lectureList">
                <!-- Will be populated by main.ts -->
            </div>
        </div>

        <!-- Upload Modal -->
        <div class="modal-overlay" id="uploadOverlay"></div>
        <div class="modal" id="uploadModal">
            <div class="modal-header">
                <h3>🔼 New Lecture</h3>
                <button id="closeUpload" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="form-group">
                        <label>Lecture Title</label>
                        <input type="text" id="upTitle" placeholder="e.g. Week 2 — Algorithms" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>PPT Video (.mp4)</label>
                            <input type="file" id="upPPT" accept="video/mp4" required>
                        </div>
                        <div class="form-group">
                            <label>Teacher Video (.mp4)</label>
                            <input type="file" id="upTeacher" accept="video/mp4" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Subtitles (.vtt)</label>
                        <input type="file" id="upVTT" accept=".vtt" required>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="submit-btn" id="submitUpload">Start Upload</button>
                        <button type="button" class="submit-btn" id="quickPlayBtn"
                            style="background:var(--chinese-color); color:#000;">Quick Play (Local) ⚡</button>
                    </div>
                    <div class="progress-container" id="upProgress" style="display:none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="upFill"></div>
                        </div>
                        <span id="upStatus">Uploading...</span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
